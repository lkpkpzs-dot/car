# 应用服务 WEB 访问端口
server.port=8080

# 数据库连接配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/car_admin?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=is_deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# Knife4j 配置
knife4j.enable=true

# Jackson 配置 (解决日期解析错误)
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# 微信小程序配置 (请替换为真实的 appid 和 secret)
wx.miniapp.appid=wxadb2b28d2975997f
wx.miniapp.secret=f355d65be0c1b449d2bf24beb094a4e5

# 文件上传配置
# 上传文件的保存路径 (建议使用绝对路径，测试环境下使用相对路径)
file.upload-path=uploads/
# 访问图片的前缀路径
file.access-path=/uploads/**
# 允许上传的文件大小
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

